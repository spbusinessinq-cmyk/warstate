kind = "web"
previewPath = "/"
title = "WARSTATE"
version = "1.0.0"
id = "artifacts/warstate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26002

[services.development]
run = "pnpm --filter @workspace/warstate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/warstate", "run", "build" ]
publicDir = "artifacts/warstate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26002"
BASE_PATH = "/"
